workflows:
  android-release:
    name: Abo Martin IPTV - Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Build APK
        script: |
          flutter pub get
          flutter build apk --release --no-shrink
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null

    artifacts:
      - build/app/outputs/apk/release/app-release.apk
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - mido6002@gmail.com
        notify:
          success: true
          failure: true
