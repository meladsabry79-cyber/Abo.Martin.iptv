name: abo_martin_iptv
description: تطبيق Abo Martin IPTV للبث المباشر والأفلام والمسلسلات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # شبكة وطلبات HTTP
  http: ^1.2.1
  dio: ^5.4.3

  # تخزين محلي
  shared_preferences: ^2.2.3

  # تشغيل الفيديو
  video_player: ^2.9.1
  chewie: ^1.8.3

  # إدارة الحالة
  provider: ^6.1.2

  # تحميل الصور
  cached_network_image: ^3.3.1

  # أيقونات
  cupertino_icons: ^1.0.6

  # منع إطفاء الشاشة
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
